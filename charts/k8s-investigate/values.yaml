replicaCount: 1

image:
  repository: k8s-investigate
  pullPolicy: IfNotPresent
  tag: ""

serviceAccount:
  create: true
  name: ""

# Run as CronJob (scan mode) or Deployment (exporter mode)
mode: cronjob  # "cronjob" or "exporter"

# CronJob settings
cronjob:
  schedule: "0 */6 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1

# Exporter settings
exporter:
  port: 8080
  interval: 600

# Scan settings
scan:
  resources: "all"
  output: "table"
  showReason: true
  excludeNamespaces: "kube-system,kube-public"
  olderThan: ""
  delete: false

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

nodeSelector: {}
tolerations: []
affinity: {}
