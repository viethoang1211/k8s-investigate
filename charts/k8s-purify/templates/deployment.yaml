{{- if eq .Values.mode "exporter" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "k8s-purify.fullname" . }}
  labels:
    {{- include "k8s-purify.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "k8s-purify.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "k8s-purify.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "k8s-purify.fullname" . }}
      containers:
        - name: k8s-purify
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - exporter
            - --port
            - {{ .Values.exporter.port | quote }}
            - --interval
            - {{ .Values.exporter.interval | quote }}
            {{- if .Values.scan.excludeNamespaces }}
            - --exclude-namespace
            - {{ .Values.scan.excludeNamespaces }}
            {{- end }}
          ports:
            - name: metrics
              containerPort: {{ .Values.exporter.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "k8s-purify.fullname" . }}
  labels:
    {{- include "k8s-purify.labels" . | nindent 4 }}
spec:
  ports:
    - port: {{ .Values.exporter.port }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "k8s-purify.selectorLabels" . | nindent 4 }}
{{- end }}
